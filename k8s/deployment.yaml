apiVersion: apps/v1
kind: Deployment
metadata:
  name: architecto-demo-api
  labels:
    app: architecto-demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: architecto-demo-api
  template:
    metadata:
      labels:
        app: architecto-demo-api
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi


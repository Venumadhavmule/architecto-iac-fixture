name: architecto-iac

on:
  pull_request:
    paths:
      - "terraform/**"
      - "pulumi/**"
      - "k8s/**"
  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check
      - name: Terraform plan
        run: terraform -chdir=terraform plan -input=false

  pulumi-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pulumi/actions@v4
        with:
          command: preview
          stack-name: dev
          work-dir: pulumi
